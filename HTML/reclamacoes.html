<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclamações</title>
    <link rel="stylesheet" href="CSS/reclamacoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="cabecalho">
        <img src="IMG/Logo da Escola.jpeg" class="logo_escola">

        <h1 class="nome_escola">E.E.E.P. Maria Carmem Vieira Moreira</h1>

        <h2 class="titulo">Escola Ativa</h2>
    </header>

    <a href="principal.html" class="btn_voltar">
        <span class="seta_voltar">◀</span>
        <span class="texto_voltar">Voltar</span>
    </a>

    <div id="reclamacoes">
        <div class="topo_reclamacoes">
            <h2 id="titulo_reclamacoes">
                Reclamações
            </h2>

            <select id="menu_tipo">
                <option value="" disabled selected>Menu/Tipo</option>
                <option>Sugestões de Projeto</option>
                <option>Sugestões de Melhoria</option>
                <option>Reclamações</option>
            </select>
        </div>


        <div id="card_reclamacoes">
            <div id="card_reclamacao">
                <div class="cabecalho_card_reclamacao">
                    <h3 id="nome_local">
                        Local
                    </h3>

                    <div class="trocar_local">
                        <button id="btn_subir" class="oculto">
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>

                        <button id="btn_descer">
                            <i class="fa-solid fa-arrow-down"></i>
                        </button>
                    </div>
                </div>

                <div class="conteudo_reclamacao">
                    <div id="lista_reclamacoes"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="JS/reclamacoes.js"></script>
</body>
</html>
