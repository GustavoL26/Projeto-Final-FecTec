<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar conta como administrador</title>
    <link rel="stylesheet" href="CSS/acesso_administrador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="cabecalho">
        <img src="IMG/Logo da Escola.jpeg" class="logo_escola">

        <h1 class="nome_escola">E.E.E.P. Maria Carmem Vieira Moreira</h1>

        <h2 class="titulo">Escola Ativa</h2>
    </header>

    <h2 id="titulo_acesso_administrador">Acesso Administrativo</h2>

    <p id="subtitulo_acesso">
        Gerencie sugestões, reclamações e melhorias da escola.
    </p>

    <form id="acesso_administrador">
        <input type="text" placeholder="Nome Completo" id="nome">

        <div class="campo_senha">
            <input type="password" placeholder="Senha" id="senha" autocomplete="off">
            <button type="button" id="btn_mostrar_senha"><i class="fa-solid fa-eye"></i></button>
        </div>
        
        <button onclick="acessoAdmin()">Entrar</button>
    </form>

    <footer class="acesso_extra">
        <div class="item_nivel">
            <p class="texto_nivel">Acessar como aluno</p>

            <a href="acesso_alunos.html" class="link_acesso">
                <div class="icone_opcao aluno_cor"></div>
            </a>
        </div>

        <div class="item_nivel">
            <p class="texto_nivel">Acessar como professor</p>

            <a href="acesso_professor.html" class="link_acesso">
                <div class="icone_opcao professor_cor"></div>
            </a>
        </div>
    </footer>

    <script src="JS/acesso.administrador.js"></script>
</body>
</html>
